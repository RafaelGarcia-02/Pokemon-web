{% extends "base.html" %}
{% block title %}Registro - Pokédex{% endblock %}
{% block content %}
    <div style="max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
        <h2>Crear Cuenta de Entrenador</h2>
        {% if error %}
            <p style="color: red;"><strong>⚠️ {{ error }}</strong></p>
        {% endif %}
        <form method="POST">
            <div style="margin-bottom: 12px;">
                <label>Nombre Completo:</label><br>
                <input type="text" name="full_name" required style="width: 100%; padding: 8px;">
            </div>
            <div style="margin-bottom: 12px;">
                <label>Nombre de Usuario:</label><br>
                <input type="text" name="username" required style="width: 100%; padding: 8px;">
            </div>
            <div style="margin-bottom: 12px;">
                <label>Email:</label><br>
                <input type="email" name="email" required style="width: 100%; padding: 8px;">
            </div>
            <div style="margin-bottom: 12px;">
                <label>Contraseña:</label><br>
                <input type="password" name="password" required style="width: 100%; padding: 8px;">
            </div>
            <button type="submit" style="background: #007bff; color: white; padding: 10px 15px; border: none; width: 100%; cursor: pointer;">Registrarse</button>
        </form>
        <p style="margin-top: 15px; text-align: center;">
            ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
        </p>
    </div>
{% endblock %}
