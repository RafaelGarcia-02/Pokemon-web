{% extends "base.html" %}

{% block title %}Panel de Control Admin - Pokédex{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>Panel del Profesor Admin: <span style="color: #cc0000;">{{ admin_name }}</span> 👑</h2>
    <a href="/logout" style="background: #dc3545; color: white; padding: 10px 15px; border-radius: 5px; text-decoration: none; font-weight: bold;">🚪 Cerrar Sesión</a>
</div>

<hr style="border: 1px solid #ddd; margin-bottom: 30px;">

<div style="display: flex; gap: 30px; flex-wrap: wrap;">

    <div style="flex: 1; min-width: 300px; background: #fff5f5; padding: 20px; border-radius: 8px; border: 2px solid #cc0000; height: fit-content;">
        <h3 id="form-title" style="margin-top:0; color: #cc0000;">➕ Añadir Nuevo Pokémon</h3>
        <form id="pokemon-form">
            <input type="hidden" id="pokemon-id" value="">

            <div style="margin-bottom: 12px;">
                <label>Número Pokédex:</label>
                <input type="number" id="pokedex_number" required style="width:100%; padding:8px; box-sizing:border-box;">
            </div>
            <div style="margin-bottom: 12px;">
                <label>Nombre:</label>
                <input type="text" id="name" required style="width:100%; padding:8px; box-sizing:border-box;">
            </div>
            <div style="margin-bottom: 12px;">
                <label>Tipo Principal:</label>
                <select id="type1" required style="width:100%; padding:8px; box-sizing:border-box;">
                    </select>
            </div>
            <div style="margin-bottom: 12px;">
                <label>Tipo Secundario (Opcional):</label>
                <select id="type2" style="width:100%; padding:8px; box-sizing:border-box;">
                    <option value="">Ninguno</option>
                    </select>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                <div>
                    <label>HP:</label>
                    <input type="number" id="hp" value="50" style="width:100%; padding:8px; box-sizing:border-box;">
                </div>
                <div>
                    <label>Ataque:</label>
                    <input type="number" id="attack" value="50" style="width:100%; padding:8px; box-sizing:border-box;">
                </div>
                <div>
                    <label>Defensa:</label>
                    <input type="number" id="defense" value="50" style="width:100%; padding:8px; box-sizing:border-box;">
                </div>
            </div>
            <div style="margin-bottom: 15px;">
                <label>URL de la Imagen:</label>
                <input type="url" id="image_url" placeholder="https://..." style="width:100%; padding:8px; box-sizing:border-box;">
            </div>
            
            <button type="submit" id="btn-submit" style="background: #28a745; color: white; border: none; padding: 10px; width: 100%; font-weight: bold; border-radius: 4px; cursor: pointer;">Guardar Pokémon</button>
            <button type="button" id="btn-cancel" style="background: #6c757d; color: white; border: none; padding: 10px; width: 100%; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 8px; display: none;">Cancelar Edición</button>
        </form>
    </div>

    <div style="flex: 2; min-width: 450px;">
        <h3 style="margin-top:0;">📋 Lista de Criaturas Registradas</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
    <input type="text" id="search-name" placeholder="🔍 Buscar por nombre o número..." style="flex: 2; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    
    <select id="filter-type" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
        <option value="">All Types (Todos)</option>
        </select>
</div>
        <table style="width: 100%; border-collapse: collapse; background: white;">
            <thead>
                <tr style="background-color: #3e3f3a; color: white; text-align: left;">
                    <th style="padding: 10px; border: 1px solid #ddd;">Nº</th>
                    <th style="padding: 10px; border: 1px solid #ddd;">Foto</th>
                    <th style="padding: 10px; border: 1px solid #ddd;">Nombre</th>
                    <th style="padding: 10px; border: 1px solid #ddd;">Tipos</th>
                    <th style="padding: 10px; border: 1px solid #ddd;">Stats (H/A/D)</th>
                    <th style="padding: 10px; border: 1px solid #ddd; text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody id="pokemon-table-body">
                </tbody>
        </table>
    </div>

</div>

<script src="/static/js/admin_crud.js"></script>
{% endblock %}
