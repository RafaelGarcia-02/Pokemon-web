{% extends "base.html" %}
{% block title %}Ingresar - Pokédex{% endblock %}
{% block content %}
    <div style="max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
        <h2>Ingresar a la Pokédex</h2>
        {% if error %}
            <p style="color: red;"><strong>⚠️ {{ error }}</strong></p>
        {% endif %}
        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label>Usuario:</label><br>
                <input type="text" name="username" required style="width: 100%; padding: 8px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Contraseña:</label><br>
                <input type="password" name="password" required style="width: 100%; padding: 8px;">
            </div>
            <button type="submit" style="background: #28a745; color: white; padding: 10px 15px; border: none; width: 100%; cursor: pointer;">Entrar</button>
        </form>
        <p style="margin-top: 15px; text-align: center;">
            ¿No tienes cuenta? <a href="/register">Regístrate aquí</a>
        </p>
    </div>
{% endblock %}
